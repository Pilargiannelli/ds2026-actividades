<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo</title>
</head>
<body>

    <h1>Catálogo</h1>

    <!-- FILTROS -->
    <input type="text" id="filtroAutor" placeholder="Buscar autor">
    <button id="filtrar">Filtrar</button>
    <button id="mostrarDisponibles">Solo disponibles</button>
    <button id="mostrarTodos">Ver todos</button>

    <ul id="listado"></ul>
    <p id="stats"></p>

    <!-- FORMULARIO -->
    <h2>Agregar libro</h2>

    <div id="errorForm" style="color:red;"></div>

    <input id="titulo" placeholder="Título">
    <input id="autor" placeholder="Autor">
    <input id="precio" type="number" placeholder="Precio">

    <label>
        Disponible
        <input type="checkbox" id="disponible">
    </label>

    <button id="agregar">Agregar</button>

    <script src="app.js"></script>

</body>
</html>
